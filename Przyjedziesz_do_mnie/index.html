<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chcesz do mnie wpaść?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Chcesz do mnie przyjechać w te wakacje? 🧐</h1>
        <div class="buttons">
            <button id="Tak">Tak 🥳</button>
            <button id="Nie">Nie 😱</button>
        </div>
    </main>

    <div id="panel" class="panel hidden">
        <div class="panel-content">
            <h2>YEY</h2>
            <img src="giphy.gif" alt="">
            <h2>Co chcesz robić? 🤔</h2>
            <p class="hint">klikaj po kilka rzeczy</p>
            <div class="options">
                <button class="option" data-activity="seriale">Ogladać seriale🎬</button>
                <button class="option" data-activity="kino">Iść do kina 🎬</button>
                <button class="option" data-activity="gry">Pograć w gry 🎮</button>
                <button class="option" data-activity="gory">Pojechać w góry ⛰️</button>
                <button class="option" data-activity="animu">Oglądać animu🎬</button>
                <button class="option" data-activity="gwiazdy">Tajemniaca</button>
            </div>
            <div class="panel-actions">
                <button id="back">wróć</button>
                <button id="confirm" class="confirm-btn">dalej →</button>
            </div>
        </div>
    </div>

    <div id="result-panel" class="panel hidden">
        <div class="panel-content">
            <h2>Super! 😄</h2>
            <p id="result-text">Wybrałaś:</p>
            <ul id="result-list"></ul>
            <button id="back-result">wróć</button>
        </div>
    </div>

    <script>
        const nie = document.getElementById("Nie");
        function moveNie() {
            const btnW = nie.offsetWidth;
            const btnH = nie.offsetHeight;
            const maxX = window.innerWidth - btnW - 10;
            const maxY = window.innerHeight - btnH - 10;
            const x = Math.floor(Math.random() * Math.max(maxX, 1)) + 5;
            const y = Math.floor(Math.random() * Math.max(maxY, 1)) + 5;
            nie.style.left = x + "px";
            nie.style.top = y + "px";
        }
        nie.addEventListener("click", moveNie);
        nie.addEventListener("mouseenter", moveNie);

        const panel = document.getElementById("panel");
        const resultPanel = document.getElementById("result-panel");
        const resultList = document.getElementById("result-list");
        const selected = new Set();

        document.getElementById("Tak").addEventListener("click", () => {
            panel.classList.remove("hidden");
        });

        document.getElementById("back").addEventListener("click", () => {
            panel.classList.add("hidden");
        });

        document.querySelectorAll(".option").forEach(btn => {
            btn.addEventListener("click", () => {
                const activity = btn.dataset.activity;
                if (selected.has(activity)) {
                    selected.delete(activity);
                    btn.classList.remove("selected");
                } else {
                    selected.add(activity);
                    btn.classList.add("selected");
                }
            });
        });

        document.getElementById("confirm").addEventListener("click", () => {
            if (selected.size === 0) return;
            const labels = {
                seriale: "Ogladać seriale🎬",
                kino: "Iść do kina 🎬",
                gry: "Pograć w gry 🎮",
                gory: "Pojechać w góry ⛰️",
                animu: "Oglądać animu🎬",
                gwiazdy: "Tajemniaca"};
            resultList.innerHTML = "";
            const chosen = [];
            selected.forEach(a => {
                const text = labels[a] || a;
                const li = document.createElement("li");
                li.textContent = text;
                resultList.appendChild(li);
                chosen.push(text);
            });
            panel.classList.add("hidden");
            resultPanel.classList.remove("hidden");

            const content = "Chce robic:\n" + chosen.map(t => " - " + t).join("\n");
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "odpowiedzi.txt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);

            fetch("https://formspree.io/f/mykvneaj", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ odpowiedzi: chosen })
            });
        });

        document.getElementById("back-result").addEventListener("click", () => {
            resultPanel.classList.add("hidden");
            selected.clear();
            document.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
        });
    </script>
</body>
</html>
